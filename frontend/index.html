<!DOCTYPE html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />

    <!-- PWA / Safari iOS -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="BaseScan" />
    <link rel="apple-touch-icon" href="/icon-192.png" />

    <!-- Thème couleur (barre de navigation Android) -->

    <meta name="description" content="Scanner de nouveaux tokens sur Base Chain — détection en temps réel avec analyse de sécurité" />

    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

      href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@400;600;700;800&display=swap"

    />

    <title>BaseScan — Token Scanner</title>
